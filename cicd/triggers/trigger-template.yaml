apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: product-api-trigger-template
  namespace: product-demo
spec:
  params:
    - name: gitrepositoryurl
      description: The git repository URL
    - name: gitrevision
      description: The git revision
      default: main
  resourcetemplates:
    - apiVersion: tekton.dev/v1beta1
      kind: PipelineRun
      metadata:
        generateName: product-api-pipeline-run-
        namespace: product-demo
      spec:
        serviceAccountName: pipeline
        pipelineRef:
          name: product-api-pipeline
        params:
          - name: GIT_REPO_URL
            value: $(tt.params.gitrepositoryurl)
          - name: GIT_REVISION
            value: $(tt.params.gitrevision)
          - name: IMAGE_NAME
            value: image-registry.openshift-image-registry.svc:5000/product-demo/product-api:latest
        workspaces:
          - name: shared-workspace
            persistentVolumeClaim:
              claimName: pipeline-workspace
