<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理システム - Product Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-edit {
            background: #28a745;
            color: white;
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .btn-edit:hover {
            background: #218838;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .products-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .product-name {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .product-description {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .product-price {
            font-size: 1.5rem;
            color: #667eea;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .product-actions {
            display: flex;
            gap: 10px;
        }

        .product-id {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        #message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        #message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        #message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛍️ 商品管理システム</h1>
            <p class="subtitle">Product Management System</p>
        </header>

        <div class="content">
            <div id="message"></div>

            <div class="form-section">
                <h2 id="formTitle">新規商品登録</h2>
                <form id="productForm">
                    <input type="hidden" id="productId">
                    <div class="form-group">
                        <label for="name">商品名 *</label>
                        <input type="text" id="name" required placeholder="例: ノートPC">
                    </div>
                    <div class="form-group">
                        <label for="description">説明</label>
                        <textarea id="description" placeholder="商品の詳細説明"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="price">価格 (円) *</label>
                        <input type="number" id="price" step="0.01" required placeholder="例: 99999.99">
                    </div>
                    <button type="submit" class="btn btn-primary" id="submitBtn">登録</button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn" style="display:none;">キャンセル</button>
                </form>
            </div>

            <div class="products-section">
                <h2>商品一覧</h2>
                <div id="productList" class="product-grid"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/products';
        let editingId = null;

        async function loadProducts() {
            try {
                const response = await fetch(API_BASE);
                const products = await response.json();
                displayProducts(products);
            } catch (error) {
                showMessage('商品の読み込みに失敗しました: ' + error.message, 'error');
            }
        }

        function displayProducts(products) {
            const productList = document.getElementById('productList');

            if (products.length === 0) {
                productList.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
                        </svg>
                        <p>商品がまだ登録されていません</p>
                    </div>
                `;
                return;
            }

            productList.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-id">ID: ${product.id}</div>
                    <div class="product-name">${escapeHtml(product.name)}</div>
                    <div class="product-description">${escapeHtml(product.description || '')}</div>
                    <div class="product-price">¥${Number(product.price).toLocaleString('ja-JP', {minimumFractionDigits: 2})}</div>
                    <div class="product-actions">
                        <button class="btn btn-edit" onclick="editProduct(${product.id})">編集</button>
                        <button class="btn btn-delete" onclick="deleteProduct(${product.id})">削除</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const product = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                price: parseFloat(document.getElementById('price').value)
            };

            try {
                let response;
                if (editingId) {
                    response = await fetch(`${API_BASE}/${editingId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(product)
                    });
                } else {
                    response = await fetch(API_BASE, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(product)
                    });
                }

                if (response.ok) {
                    showMessage(editingId ? '商品を更新しました' : '商品を登録しました', 'success');
                    resetForm();
                    loadProducts();
                } else {
                    showMessage('エラーが発生しました', 'error');
                }
            } catch (error) {
                showMessage('通信エラー: ' + error.message, 'error');
            }
        });

        async function editProduct(id) {
            try {
                const response = await fetch(`${API_BASE}/${id}`);
                const product = await response.json();

                document.getElementById('productId').value = product.id;
                document.getElementById('name').value = product.name;
                document.getElementById('description').value = product.description || '';
                document.getElementById('price').value = product.price;

                editingId = id;
                document.getElementById('formTitle').textContent = '商品編集';
                document.getElementById('submitBtn').textContent = '更新';
                document.getElementById('cancelBtn').style.display = 'inline-block';

                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (error) {
                showMessage('商品の読み込みに失敗しました: ' + error.message, 'error');
            }
        }

        async function deleteProduct(id) {
            if (!confirm('この商品を削除してもよろしいですか？')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showMessage('商品を削除しました', 'success');
                    loadProducts();
                } else {
                    showMessage('削除に失敗しました', 'error');
                }
            } catch (error) {
                showMessage('通信エラー: ' + error.message, 'error');
            }
        }

        function resetForm() {
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            editingId = null;
            document.getElementById('formTitle').textContent = '新規商品登録';
            document.getElementById('submitBtn').textContent = '登録';
            document.getElementById('cancelBtn').style.display = 'none';
        }

        document.getElementById('cancelBtn').addEventListener('click', resetForm);

        function showMessage(message, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = message;
            messageDiv.className = type;
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        loadProducts();
    </script>
</body>
</html>
